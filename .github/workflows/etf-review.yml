name: Monthly ETF 3-year Review

# 매월 1일 KST 03:00 (UTC 전날 18:00)에 실행.
# 상장 후 3년이 막 지난 ETF를 자동으로 포함시켜 market='ETF' 로 승격.
# 이미 3년 이상 데이터가 있는 ETF는 건너뛰어 pykrx rate-limit을 아낀다.
on:
  schedule:
    - cron: "0 18 1 * *"   # 매월 1일 UTC 18:00 = KST 03:00 (다음날)
  workflow_dispatch:
    inputs:
      sleep:
        description: "티커당 대기 시간 (초). rate limit 조절"
        required: false
        default: "0.15"

concurrency:
  group: etf-review-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./poc
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: poc/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify DB + schema
        run: |
          python -c "from db import init_db, is_pg; assert is_pg(), 'DATABASE_URL missing'; init_db()"

      - name: ETF review (refill only <3y tickers)
        run: python seed_etf.py --review-only --sleep ${{ inputs.sleep || '0.15' }}

      - name: Summary
        if: always()
        run: |
          python -c "
          from db import get_conn
          c = get_conn()
          n = c.execute('SELECT COUNT(*) FROM tickers').fetchone()[0]
          print(f'total tickers: {n}')
          rows = c.execute('SELECT market, COUNT(*) FROM tickers GROUP BY market ORDER BY market').fetchall()
          for m, k in rows:
              print(f'  {m:<10} {k}')
          "
